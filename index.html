<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Kahoot Bridge</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
</head>
<body>
  <h1>Join Kahoot</h1>
  <form id="f">
    <input id="pin" placeholder="Game PIN" required>
    <input id="nick" placeholder="Nickname" required>
    <button>Join</button>
  </form>
  <pre id="events"></pre>
  <script>
    const ws = new WebSocket((location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host);
    const log = s => document.getElementById('events').textContent += s + '\n';
    ws.onopen = () => log('WebSocket open');
    ws.onmessage = e => log('← ' + e.data);
    ws.onerror = e => log('WebSocket error');
    document.getElementById('f').onsubmit = e => {
      e.preventDefault();
      ws.send(JSON.stringify({ action:'join', pin: document.getElementById('pin').value, nick: document.getElementById('nick').value }));
      log('→ join sent');
    };
  </script>
</body>
</html>
